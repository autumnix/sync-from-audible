services:
  sync-audible:
    build: .
    container_name: sync-audible
    restart: unless-stopped
    environment:
      - PUID=99
      - PGID=100
      - AUDIBLE_PASSWORD=${AUDIBLE_PASSWORD}
      - ACTIVATION_BYTES=${ACTIVATION_BYTES}
      - COUNTRY_CODE=us
      - CONTINUOUS=true
      - POLL_INTERVAL=3600
      - MAX_RETRIES=3
    volumes:
      # Audible auth + state database
      - /mnt/user/appdata/sync-audible:/config
      # Write directly to the Listenarr ingest directory
      - /mnt/user/media/torrents/ingest/audiobooks:/audiobooks
