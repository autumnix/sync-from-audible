services:
  sync-audible:
    build: .
    container_name: sync-audible
    restart: unless-stopped
    environment:
      - PUID=99
      - PGID=100
      - AUDIBLE_PASSWORD=${AUDIBLE_PASSWORD}
      - ACTIVATION_BYTES=${ACTIVATION_BYTES}
      - COUNTRY_CODE=us
      - CONTINUOUS=true
      - POLL_INTERVAL=3600
      - MAX_RETRIES=3
      - INGEST_DIR=/media/ingest
    volumes:
      # Audible auth + state database
      - /mnt/user/appdata/sync-audible:/config
      # Persistent library — on same share as ingest so hardlinks work
      - /mnt/user/media/sync-audible/audiobooks:/audiobooks
      # Listenarr ingest directory (hardlinks land here)
      - /mnt/user/media/torrents/ingest/audiobooks:/media/ingest
